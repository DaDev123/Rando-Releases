<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Randomizer Releases</title>
<style>
  :root{
    --bg: #0a0e1a;
    --panel: #0f1526;
    --line: #1e2740;
    --ink: #e6ebf5;
    --ink-dim: #6b7590;
    --accent: #4f8cff;
    --accent-dim: #2a3a5c;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at top, rgba(79,140,255,0.10), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    min-height:100vh;
    padding:64px 24px;
  }
  .wrap{max-width:640px;margin:0 auto;}

  h1{
    font-size:26px;
    font-weight:700;
    margin:0 0 32px;
    letter-spacing:-0.02em;
    text-align:center;
    background:linear-gradient(180deg, #eaf0ff, #9db4e6);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 8px 30px rgba(0,0,0,0.35);
  }
  .panel-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 20px;
    border-bottom:1px solid var(--line);
    font-size:12px;
    color:var(--ink-dim);
    letter-spacing:0.03em;
  }
  #count{color:var(--accent);}

  .row{
    display:flex;
    align-items:center;
    gap:14px;
    padding:14px 20px;
    border-bottom:1px solid var(--line);
    font-size:14px;
    transition:background 0.12s ease;
  }
  .row:last-child{border-bottom:none;}
  .row:hover{background:rgba(79,140,255,0.06);}

  .name{
    flex:1;
    min-width:0;
    color:var(--ink);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .dl{
    flex-shrink:0;
    color:var(--accent);
    text-decoration:none;
    font-size:13px;
    font-weight:600;
    border:1px solid var(--accent-dim);
    padding:6px 12px;
    border-radius:6px;
    transition:border-color 0.12s ease, background 0.12s ease;
  }
  .dl:hover{
    border-color:var(--accent);
    background:rgba(79,140,255,0.1);
  }

  .empty{
    padding:40px 20px;
    text-align:center;
    color:var(--ink-dim);
    font-size:14px;
    line-height:1.6;
  }
</style>
</head>
<body>
<div class="wrap">

  <h1>Randomizer Releases</h1>

  <div class="panel">
    <div class="panel-head">
      <span>Directory listing</span>
      <span id="count">—</span>
    </div>
    <div id="listing">
      <div class="empty">Reading ./files …</div>
    </div>
  </div>

</div>

<script>
const FOLDER = "files/";

async function loadListing(){
  const listingEl = document.getElementById('listing');
  const countEl = document.getElementById('count');

  try{
    const folderUrl = new URL(FOLDER, location.href);
    const res = await fetch(folderUrl, { cache: "no-store" });
    const html = await res.text();

    const doc = new DOMParser().parseFromString(html, "text/html");
    const anchors = Array.from(doc.querySelectorAll('a'));

    let files = anchors
      .map(a => new URL(a.getAttribute('href') || "", folderUrl))
      .filter(u => u.pathname.startsWith(folderUrl.pathname))
      .filter(u => u.pathname !== folderUrl.pathname)
      .filter(u => !u.pathname.endsWith('/'))
      .filter(u => !u.search)
      .map(u => ({
        href: u.href,
        name: decodeURIComponent(u.pathname.split('/').filter(Boolean).pop())
      }))
      .filter((f, i, arr) => arr.findIndex(x => x.name === f.name) === i);

    if(files.length === 0){
      listingEl.innerHTML = '<div class="empty">The files folder is empty.</div>';
      countEl.textContent = "0 files";
      return;
    }

    files.sort((a,b) => a.name.localeCompare(b.name));
    countEl.textContent = files.length + (files.length === 1 ? " file" : " files");

    listingEl.innerHTML = files.map(f => `
        <div class="row">
          <div class="name" title="${f.name}">${f.name}</div>
          <a class="dl" href="${f.href}" download>Download</a>
        </div>`).join("");

  }catch(err){
    listingEl.innerHTML = '<div class="empty">The files folder is empty.</div>';
    countEl.textContent = "0 files";
  }
}

loadListing();
</script>
</body>
</html>
